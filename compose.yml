services:
  api2cursor:
    build: .
    ports:
      - "${PROXY_PORT:-3029}:${PROXY_PORT:-3029}"
    env_file:
      - .env
    # 挂到容器内 DATA_DIR（与 settings.json 同级，见 settings.py / doc/conversation-index-and-docker.md）
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PROXY_PORT:-3029}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
